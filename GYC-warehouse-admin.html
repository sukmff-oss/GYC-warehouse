<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>國研化工 | 倉儲管理系統 v4（管理版）</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0d0a08;--surface:rgba(30,24,18,0.65);--surface-solid:#1e1810;
--border:rgba(255,220,180,0.1);--text:#e8dfd0;
--accent:#6abf4a;--danger:#e05050;--warn:#d4850a;
--btn-bg:rgba(30,24,18,0.7);--btn-text:#e8dfd0;--btn-radius:16px;
--glass:rgba(30,24,18,0.5);--glass-border:rgba(255,220,180,0.15);
--grad-main:linear-gradient(135deg,#6abf4a,#3d9edd,#a855f7);
--grad-warm:linear-gradient(135deg,#f59e0b,#ef4444,#ec4899);
--grad-cool:linear-gradient(135deg,#06b6d4,#3b82f6,#8b5cf6);
--glow-accent:0 0 20px rgba(106,191,74,0.4),0 0 40px rgba(106,191,74,0.2);
--glow-warm:0 0 20px rgba(245,158,11,0.4),0 0 40px rgba(245,158,11,0.2);
}
html,body{height:100%;overflow:hidden}
body{
 font-family:'Microsoft JhengHei','PingFang TC',sans-serif;
 background: linear-gradient(135deg,#0d0a08 0%,#1e1810 50%,#0d0a08 100%);
 color:var(--text);
 display:flex;flex-direction:column;min-height:100vh;overflow-x:hidden;overflow-y:auto
}
.glass{
 background:rgba(30,24,18,0.5);
 backdrop-filter:blur(12px);
 -webkit-backdrop-filter:blur(12px);
 border:1px solid rgba(255,220,180,0.15);
 border-radius:var(--btn-radius);
 box-shadow:0 4px 20px rgba(0,0,0,0.3),0 0 1px rgba(255,220,180,0.08) inset;
 position:relative;overflow:hidden
}
.glass::before{
 content:'';position:absolute;top:0;left:0;right:0;height:1px;
 background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent)
}

/* 頁面容器 */
.page{display:none;flex-direction:column;min-height:100vh;padding:16px;gap:12px;flex-shrink:0}
.page.active{display:flex !important;visibility:visible !important;position:absolute;top:0;left:0;right:0;bottom:0;z-index:10;overflow-y:auto;min-height:100vh;height:100vh}

/* 登入畫面 */
#loginPage{justify-content:center;align-items:center;gap:20px;background:radial-gradient(ellipse at 30% 20%,rgba(106,191,74,0.08) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(168,85,247,0.06) 0%,transparent 50%),linear-gradient(135deg,#0d0a08 0%,#1e1810 50%,#0d0a08 100%)}
.login-box{
 background:rgba(20,14,8,0.92);
 backdrop-filter:blur(20px);
 -webkit-backdrop-filter:blur(20px);
 border:1px solid rgba(255,220,180,0.15);
 border-radius:24px;
 padding:36px 32px;
 width:min(400px,92vw);
 text-align:center;
 box-shadow:0 8px 32px rgba(0,0,0,0.5),0 0 60px rgba(106,191,74,0.08),inset 0 1px 0 rgba(255,255,255,0.05);
 position:relative;overflow:hidden
}
.login-box::before{
 content:'';position:absolute;top:0;left:0;right:0;height:2px;
 background:var(--grad-main);border-radius:24px 24px 0 0
}
.login-box::after{
 content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
 background:linear-gradient(45deg,transparent 40%,rgba(255,255,255,0.03) 50%,transparent 60%);
 pointer-events:none
}
.login-box h2{font-size:24px;margin-bottom:8px;letter-spacing:2px;color:#e8dfd0}
.login-box .sub{font-size:13px;color:#a09080;margin-bottom:24px}
.qr-box{margin:0 auto 20px;width:160px;height:160px;background:#1e1810;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.4)}
input[type="password"],input[type="text"],input[type="number"]{
 width:100%;padding:15px 18px;
 border:1.5px solid rgba(255,220,180,0.15);border-radius:999px;
 background:rgba(20,16,10,0.8);color:#e8dfd0;font-size:16px;font-family:inherit;outline:none;transition:border .2s
}
input::placeholder{color:#7a6a58}
input:focus{border-color:var(--accent)}
.btn{
 display:inline-flex;align-items:center;justify-content:center;gap:8px;
 padding:15px 28px;border:none;border-radius:var(--btn-radius);
 font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;
 transition:transform .15s,box-shadow .15s;
 min-height:54px;
 box-shadow:0 2px 8px rgba(0,0,0,0.06);
 position:relative;overflow:hidden
}
.btn::after{
 content:'';position:absolute;top:-50%;left:-60%;width:200%;height:200%;
 background:linear-gradient(45deg,transparent 45%,rgba(255,255,255,0.12) 50%,transparent 55%);
 pointer-events:none;transition:left .3s
}
.btn:hover::after{left:-10%}
.btn:active{transform:scale(.96)}
.btn:active::after{left:-20%}
.btn-primary{
 background:var(--accent);color:#0d0a08;width:100%;
 box-shadow:0 4px 16px rgba(106,191,74,0.35),0 0 24px rgba(106,191,74,0.15);
 position:relative;overflow:hidden
}
.btn-primary::before{
 content:'';position:absolute;top:0;left:0;right:0;height:50%;
 background:linear-gradient(to bottom,rgba(255,255,255,0.15),transparent);
 border-radius:inherit
}
.btn-outline{background:var(--glass);color:var(--text);border:1.5px solid rgba(255,220,180,0.15);padding:13px 20px;min-height:48px;backdrop-filter:blur(8px)}
.btn-danger{background:var(--danger);color:#fff;width:100%}
.btn-sm{padding:9px 16px;font-size:14px;min-height:42px}

/* 主選單 */
#menuPage{padding-top:16px;gap:16px;background:radial-gradient(ellipse at 50% 0%,rgba(106,191,74,0.05) 0%,transparent 60%)}
.menu-title{text-align:center;padding:16px 0 6px}
.menu-title h1{font-size:26px;letter-spacing:3px;font-weight:800}
.menu-title p{font-size:14px;color:#7a6a58;margin-top:6px}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:6px 2px}
.menu-btn{
 display:flex;flex-direction:row;align-items:center;gap:14px;
 padding:18px 18px;
 background:rgba(30,24,18,0.75);
 backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
 color:#e8dfd0;border-radius:18px;
 font-size:17px;font-weight:700;cursor:pointer;
 border:1.5px solid rgba(255,220,180,0.15);
 font-family:inherit;transition:transform .15s,box-shadow .15s;
 box-shadow:0 3px 12px rgba(0,0,0,0.3);
 min-height:72px;text-align:left;
 position:relative;overflow:hidden
}
.menu-btn::after{
 content:'';position:absolute;top:0;left:0;right:0;height:1px;
 background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent)
}
.menu-btn .icon{font-size:26px;flex-shrink:0;filter:drop-shadow(0 0 6px rgba(255,255,255,0.1))}
.menu-btn:active{transform:scale(.97)}
.menu-btn.wide{grid-column:span 2}
.menu-badge{
 display:inline-flex;align-items:center;justify-content:center;
 min-width:20px;height:20px;padding:0 5px;
 background:var(--danger);color:#fff;border-radius:999px;
 font-size:11px;font-weight:700;margin-left:auto;
 animation:badge-pulse 1.5s ease-in-out infinite;
}
@keyframes badge-pulse{
 0%,100%{box-shadow:0 0 0 0 rgba(224,80,80,.5)}
 50%{box-shadow:0 0 0 6px rgba(224,80,80,0)}
}

/* 老闆報告系統 */
.report-tabs{display:flex;gap:6px;margin:10px 0;flex-wrap:wrap}
.r-tab{
 padding:8px 14px;border-radius:999px;font-size:13px;font-weight:700;
 background:rgba(30,24,18,.6);border:1.5px solid rgba(255,220,180,.12);
 color:#a09080;cursor:pointer;transition:all .15s;
 position:relative;overflow:hidden
}
.r-tab::before{
 content:'';position:absolute;top:0;left:0;right:0;height:50%;
 background:linear-gradient(to bottom,rgba(255,255,255,0.05),transparent);pointer-events:none
}
.r-tab.active{background:rgba(106,191,74,.2);color:var(--accent);border-color:rgba(106,191,74,.4);box-shadow:0 0 12px rgba(106,191,74,0.2)}
.report-toolbar{display:flex;align-items:center;justify-content:space-between;margin:8px 0;gap:8px}
.report-body{margin-top:4px}
.report-table{width:100%;border-collapse:collapse;font-size:13px}
.report-table th{background:rgba(106,191,74,.15);color:var(--accent);padding:8px 10px;text-align:left;font-weight:700;border-bottom:1.5px solid rgba(106,191,74,.3)}
.report-table td{padding:7px 10px;border-bottom:1px solid rgba(255,220,180,.08);color:#e8dfd0}
.report-table tr:hover td{background:rgba(106,191,74,.05)}
.report-in{color:var(--green)}
.report-out{color:var(--danger)}
.report-sum{margin-top:12px;padding:10px 14px;background:rgba(106,191,74,.1);border-radius:10px;border:1px solid rgba(106,191,74,.25);display:flex;justify-content:space-between;font-size:13px;font-weight:700}
.btn-print{padding:6px 14px;background:rgba(106,191,74,.15);color:var(--accent);border:1px solid rgba(106,191,74,.3);border-radius:999px;font-size:12px;font-weight:700;cursor:pointer}

/* 角色選擇 */
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.role-btn{
 padding:12px 8px;border-radius:14px;font-size:14px;font-weight:700;
 background:rgba(30,24,18,0.7);border:1.5px solid rgba(255,220,180,0.15);
 color:#e8dfd0;cursor:pointer;transition:all .15s;text-align:center;
 position:relative;overflow:hidden
}
.role-btn::before{
 content:'';position:absolute;top:0;left:0;right:0;height:50%;
 background:linear-gradient(to bottom,rgba(255,255,255,0.06),transparent);
 pointer-events:none
}
.role-btn:hover{border-color:rgba(106,191,74,0.4);background:rgba(106,191,74,0.1)}

/* 產品線篩選列 */
.line-filter{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
.line-btn{
 padding:8px 18px;border-radius:999px;font-size:14px;font-weight:700;
 background:rgba(30,24,18,0.6);border:1.5px solid rgba(255,220,180,0.12);
 color:#a09080;cursor:pointer;transition:all .15s;backdrop-filter:blur(6px);
 pointer-events:auto;position:relative;z-index:1;
}
.line-btn.active{background:rgba(106,191,74,.2);border-color:var(--accent);color:var(--accent)}
.line-btn:active{transform:scale(.95)}

/* 通用功能頁 */
.func-header{display:flex;align-items:center;gap:12px;padding-bottom:14px;border-bottom:1.5px solid rgba(255,220,180,0.08);margin-bottom:6px}
.back-btn{
 background:rgba(30,24,18,0.7);border:1px solid rgba(255,220,180,0.12);
 color:#e8dfd0;border-radius:10px;padding:10px 14px;font-size:18px;cursor:pointer;
 backdrop-filter:blur(8px);
}
.page-title{font-size:18px;font-weight:700}

/* 產品網格（4x4） */
.prod-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}
.prod-btn{
 display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
 padding:16px 6px;
 background:rgba(30,24,18,0.75);border:1.5px solid rgba(255,220,180,0.15);
 border-radius:14px;color:#e8dfd0;
 font-size:14px;font-weight:700;cursor:pointer;
 transition:all .15s;font-family:inherit;
 box-shadow:0 2px 8px rgba(0,0,0,0.2);
 backdrop-filter:blur(8px);
 position:relative;overflow:hidden
}
.prod-btn::before{
 content:'';position:absolute;top:0;left:0;right:0;height:50%;
 background:linear-gradient(to bottom,rgba(255,255,255,0.06),transparent);pointer-events:none
}
.prod-btn:active{transform:scale(.95);border-color:var(--accent)}
.prod-btn .name{font-size:15px;font-weight:800}
.prod-btn .color{font-size:12px;color:#a09080;font-weight:400}
.prod-btn.selected{border-color:var(--accent);background:rgba(106,191,74,.12)}

/* 庫存顯示 */
.stock-display{
 background:rgba(30,24,18,0.75);border:1.5px solid rgba(255,220,180,0.15);
 border-radius:16px;padding:20px;margin-top:14px;text-align:center;
 backdrop-filter:blur(10px);box-shadow:0 4px 16px rgba(0,0,0,0.3);
}
.stock-display .stock-num{font-size:40px;font-weight:800;color:var(--accent);margin:8px 0}
.stock-display .stock-info{font-size:13px;color:#a09080}

/* 數量輸入 */
.qty-section{margin-top:14px}
.qty-section label{font-size:14px;color:#a09080;display:block;margin-bottom:8px;font-weight:600}
.qty-row{display:flex;gap:10px;align-items:center}
.qty-row input{flex:1}
.qty-row .unit-tag{
 background:rgba(30,24,18,0.8);border:1.5px solid rgba(255,220,180,0.12);
 border-radius:999px;padding:13px 18px;font-size:15px;backdrop-filter:blur(8px);
}

/* 歷史列表 */
.hist-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:14px}
.hist-table th{text-align:left;padding:10px 8px;border-bottom:2px solid rgba(255,220,180,0.1);color:#7a6a58;font-weight:600;font-size:12px}
.hist-table td{padding:13px 8px;border-bottom:1px solid rgba(255,220,180,0.05)}
.tag-in{background:rgba(106,191,74,.15);color:var(--accent);padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600}
.tag-out{background:rgba(224,80,80,.12);color:var(--danger);padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600}

/* 類別/產品管理 */
.cat-tags{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
.cat-tag{
 display:inline-flex;align-items:center;gap:6px;
 background:rgba(30,24,18,0.75);border:1.5px solid rgba(255,220,180,0.15);
 border-radius:999px;padding:7px 14px;font-size:13px;font-weight:600;
 backdrop-filter:blur(8px);box-shadow:0 2px 6px rgba(0,0,0,0.2);
}
.cat-tag .del{color:var(--danger);cursor:pointer;font-size:15px}
.cat-add{display:flex;gap:8px;margin-top:10px}
.cat-add input{flex:1;background:rgba(20,16,10,0.8);border-color:rgba(255,220,180,0.15)}
input[type="date"]{color:#e8dfd0}

/* 空狀態 */
.empty{text-align:center;color:#aaa;padding:40px 0;font-size:14px}

/* 登出確認 */
.logout-row{display:flex;gap:10px;margin-top:auto;padding-top:14px}
.logout-row .btn{width:100%}
</style>

<style>
/* 列印時只顯示表格，相關提示文字也保留 */
@media print {
 .back-btn,.func-header input[type="text"],.menu-badge,
 button[onclick="window.print()"],#searchHist,.tag-out[style*="待點收"],
 tr:has(.tag-out[style*="待點收"]){display:none !important}
 tr[style*="待點收"]{display:none !important}
 .page-section,header,.nav-tabs,.page-title,.func-header{display:none !important}
 #historyPage{display:block !important}
 #historyPage .func-header,#historyPage div[style*="overflow-x"]{display:block !important}
 #historyPage .func-header{display:none !important}
 #histTable{margin-top:0 !important}
 body{background:#fff !important;color:#000 !important}
 .hist-table{width:100%;border-collapse:collapse}
 .hist-table th,.hist-table td{border:1px solid #333;padding:8px;color:#000}
 .hist-table th{background:#eee}
}
</style>
</head>
<body>

<!-- ═══ 登入畫面 ═══ -->
<div class="page active" id="loginPage">
<div class="login-box">
<h2>📦 國研化工</h2>
<p class="sub">倉儲管理系統 v4</p>
<div class="qr-box" id="qrcode"></div>
<div class="role-grid" id="roleGrid">
<button class="role-btn" onclick="showPwdInput('admin')">🔐 管理員</button>
<button class="role-btn" onclick="showPwdInput('su')">👑 蘇董</button>
<button class="role-btn" onclick="showPwdInput('factory')">🏭 廠長</button>
<button class="role-btn" onclick="showPwdInput('warehouse')">📥 倉儲</button>
<button class="role-btn" onclick="showPwdInput('purchase')">🛒 採購</button>
</div>
<div id="pwdSection" style="display:none;margin-top:12px">
<input type="password" id="loginPwd" dir="ltr" style="text-align:left" placeholder="輸入密碼" onkeydown="if(event.key==='Enter')tryLogin()">
<button class="btn btn-primary" style="margin-top:8px;width:100%" onclick="tryLogin()">登入</button>
<button class="btn btn-outline" style="margin-top:6px;width:100%" onclick="backToRoles()">← 返回</button>
</div>
<p id="loginErr" style="color:var(--danger);margin-top:10px;font-size:13px;display:none">密碼錯誤</p>
</div>
<!-- ═══ 主選單 ═══ -->
<div class="page" id="menuPage">
  <div class="menu-title">
    <h1>📋 主選單</h1>
    <p>歡迎：RBAC 管理系統</p>
  </div>
<div class="menu-grid">
<button class="menu-btn" onclick="showPage('stockPage')"><span class="icon">📦</span>庫存查詢</button>
<button class="menu-btn" onclick="showPage('prodPage')"><span class="icon">🏭</span>生產作業</button>
<button class="menu-btn" onclick="showPage('outPage')"><span class="icon">📤</span>出庫作業</button>
<button class="menu-btn" onclick="showPage('inPage')"><span class="icon">📥</span>入庫作業<span id="badgeIn" class="menu-badge" style="display:none">0</span></button>
<button class="menu-btn" onclick="showPage('historyPage')"><span class="icon">📋</span>簽收列印<span id="badgeHist" class="menu-badge" style="display:none">0</span></button>
<button class="menu-btn" onclick="showPage('catPage')"><span class="icon">⚙️</span>類別管理</button>
<button class="menu-btn wide" onclick="doLogout()"><span class="icon">🚪</span>登出</button>
</div>
  <div class="logout-row">
    <span style="font-size:12px;color:#555;align-self:center">GYC Warehouse v4.0 Admin</span>
  </div>
</div>

<!-- ═══ 庫存查詢（老闆報告系統）═══ -->
<div class="page" id="stockPage">
 <div class="func-header">
 <button class="back-btn" onclick="showPage('menuPage')">←</button>
 <span class="page-title">📦 庫存查詢</span>
 </div>

 <!-- 報告類型切換 -->
 <div class="report-tabs" id="reportTabs">
  <button class="r-tab active" onclick="switchReport('daily',this)">📅 每日</button>
  <button class="r-tab" onclick="switchReport('monthly',this)">📆 每月</button>
  <button class="r-tab" onclick="switchReport('total',this)">📊 總庫存</button>
  <button class="r-tab" onclick="switchReport('custom',this)">🔍 自訂查詢</button>
 </div>

 <!-- 每日報告 -->
 <div id="reportDaily" class="report-body">
  <div class="report-toolbar">
   <span id="dailyDateLabel" style="font-size:14px;font-weight:700;color:var(--accent)"></span>
   <button class="btn-print" onclick="window.print()">🖨️ 列印</button>
  </div>
  <div id="dailyReportContent"></div>
 </div>

 <!-- 每月報告 -->
 <div id="reportMonthly" class="report-body" style="display:none">
  <div class="report-toolbar">
   <select id="monthSel" onchange="renderMonthlyReport()" style="padding:7px 12px;border-radius:999px;border:1.5px solid rgba(255,220,180,.15);background:rgba(20,16,10,.8);color:#e8dfd0;font-size:13px">
    <option value="">請選擇月份</option>
   </select>
   <button class="btn-print" onclick="window.print()">🖨️ 列印</button>
  </div>
  <div id="monthlyReportContent"></div>
 </div>

 <!-- 總庫存報告 -->
 <div id="reportTotal" class="report-body" style="display:none">
  <div class="report-toolbar">
   <span style="font-size:13px;color:#a09080">截至今日</span>
   <button class="btn-print" onclick="window.print()">🖨️ 列印</button>
  </div>
  <div id="totalReportContent"></div>
 </div>

 <!-- 自訂查詢 -->
 <div id="reportCustom" class="report-body" style="display:none">
  <div class="report-toolbar" style="flex-wrap:wrap;gap:8px">
   <input type="date" id="customStart" onchange="renderCustomReport()" style="padding:7px 12px;border-radius:999px;border:1.5px solid rgba(255,220,180,.15);background:rgba(20,16,10,.8);color:#e8dfd0;font-size:13px">
   <span style="color:#888">~</span>
   <input type="date" id="customEnd" onchange="renderCustomReport()" style="padding:7px 12px;border-radius:999px;border:1.5px solid rgba(255,220,180,.15);background:rgba(20,16,10,.8);color:#e8dfd0;font-size:13px">
   <button class="btn-print" onclick="window.print()">🖨️ 列印</button>
  </div>
  <div id="customReportContent"></div>
 </div>
</div>

<!-- ═══ 生產作業 ═══ -->
<div class="page" id="prodPage">
 <div class="func-header">
 <button class="back-btn" onclick="showPage('menuPage')">←</button>
 <span class="page-title">🏭 生產作業</span>
 </div>
 <div class="line-filter" id="prodLineFilter"></div>
 <div class="prod-grid" id="prodGrid"></div>
 <div class="qty-section" id="prodQtySection" style="display:none">
 <label id="prodProdLabel">選擇品名</label>
 <div class="qty-row">
 <input type="number" id="prodQty" placeholder="輸入數量" min="1">
 <span class="unit-tag" id="prodUnitTag">KG</span>

// 工具函數

function api(action,params={}){
  return new Promise((res,rej)=>{
    let url = API_URL+'?action='+action;
    for(let k in params) url+='&'+encodeURIComponent(k)+'='+encodeURIComponent(params[k]);
    fetch(url).then(r=>r.json()).then(res).catch(rej);
  });
}

function getData(){
 if(_cachedData) return _cachedData;
 try{let x=localStorage.getItem(STORAGE_KEY);if(x){_cachedData=JSON.parse(x);return _cachedData}}catch(e){}
 return {products:[],history:[],pendingIn:[]};
}

function saveData(d){
 _cachedData=d;
 try{
  let prev={products:[],history:[],pendingIn:[]};
  let old=localStorage.getItem(STORAGE_KEY);
  if(old)try{prev=JSON.parse(old)}catch(e){}
  let merged={products:d.products||prev.products||[],history:d.history||prev.history||[],pendingIn:d.pendingIn||prev.pendingIn||[]};
  localStorage.setItem(STORAGE_KEY,JSON.stringify(merged));
 }catch(e){}
}

function getTypes(){
  if(_categories) return _categories;
  try{let x=localStorage.getItem(CAT_KEY);if(x){_categories=JSON.parse(x);return _categories}}catch(e){}
  _categories=['原料','成品','其他'];
  return _categories;
}

function saveCategories(cats){
  _categories=cats;
  try{localStorage.setItem(CAT_KEY,JSON.stringify(cats))}catch(e){}
}

function calcStock(name){
  let d=getData();
  let stock=0;
  for(let h of d.history){
    if(h.deleted) continue;
    if(h.name!==name) continue;
    stock += (h.type==='in'?h.qty:-h.qty);
  }
  return stock;
}

// 每日報告
function renderDailyReport(){
 document.getElementById('dailyDateLabel').textContent = today;

 renderReportTable('dailyReportContent', rows, today+' 出入庫明細');
 let sumIn = rows.filter(r=>r.type==='in').reduce((s,r)=>s+r.qty,0);

 document.getElementById('dailyReportContent').innerHTML +=

  '<div class="report-sum"><span>今日出庫合計</span><span class="report-out">'+sumOut.toLocaleString()+' KG</span></div>'+
  '<div class="report-sum"><span>淨變化</span><span style="color:'+(sumIn-sumOut>=0?'var(--green)':'var(--danger)')+'">'+(sumIn-sumOut).toLocaleString()+' KG</span></div>';
}

// 每月報告
function renderMonthlyReport(){
 let sel = document.getElementById('monthSel');
 let d = getData();
 // 動態產生月份選項
 if(!sel.options.length || sel.options.length<=1){
  let months = [...new Set(d.history.map(h=>h.date.substring(0,7)))].sort().reverse();
  sel.innerHTML = '<option value="">請選擇月份</option>';
  months.forEach(m=>{
   let [y,mo]=m.split('-');
   let label = y+'年'+parseInt(mo)+'月';
   sel.innerHTML += '<option value="'+m+'">'+label+'</option>';
  });
 }
 let val = sel.value;
 if(!val){ document.getElementById('monthlyReportContent').innerHTML='<div class="empty">請選擇月份</div>'; return; }
 let [y,mo]=val.split('-');
 let label = y+'年'+parseInt(mo)+'月';
 let rows = d.history.filter(h=>!h.deleted && h.date.substring(0,7)===val);
 renderReportTable('monthlyReportContent', rows, label+' 出入庫明細');
 let sumIn = rows.filter(r=>r.type==='in').reduce((s,r)=>s+r.qty,0);
 let sumOut = rows.filter(r=>r.type==='out').reduce((s,r)=>s+r.qty,0);
 document.getElementById('monthlyReportContent').innerHTML +=

}

   '<td class="'+(h.type==='in'?'report-in':'report-out')+'">'+(h.type==='in'?'入庫':'出庫')+'</td>'+

 el.prepend(wrap);
}

 });

function buildProdGrid(containerId, onSelect){

// 簽收入庫（把 pending 移到正式 history）
async function signIn(id){
 let d=getData();
 let item=d.pendingIn.find(h=>h.id===id);
 if(!item){ alert('找不到該筆資料'); return; }
 // 移入正式歷史
 let rec={id:item.id,type:'in',name:item.name,model:item.model,qty:item.qty,unit:item.unit,customer:item.customer||'-',date:item.date||today};
 d.history.unshift(rec);
 // 從 pending 移除
 d.pendingIn=d.pendingIn.filter(h=>h.id!==id);
 saveData(d);
 try{await api('addHistory',{record:JSON.stringify(rec)})}catch(e){}
 renderPendingIn();
 updateBadges();
 alert('✅ 簽收成功！\n品名：'+item.name+'\n數量：'+item.qty+' '+item.unit);
}

// 歷史紀錄（簽收列印）
// ════════════════════════════════════════
function renderHistory(){
 let d=getData();
 let kw=document.getElementById('searchHist').value.toLowerCase();

 // 待點收記錄（來自生產）
 let pending = (d.pendingIn||[]).filter(h=>!kw||h.name.toLowerCase().includes(kw)||(h.customer&&h.customer.toLowerCase().includes(kw)));

 // 正式歷史
 let rows=d.history.filter(h=>!h.deleted&&(!kw||h.name.toLowerCase().includes(kw)||(h.customer&&h.customer.toLowerCase().includes(kw))));

 let tbody=document.getElementById('histBody');
 if(pending.length===0 && rows.length===0){tbody.innerHTML='<tr><td colspan="6" class="empty">尚無記錄</td></tr>';return;}

 let html='';

 // 待點收（紅色燈，顯示在最上面）
 if(pending.length>0){
  html+='<tr style="background:rgba(239,68,68,.08)"><td colspan="6" style="font-size:12px;color:var(--danger);padding:6px 10px;font-weight:700">🔴 待點收（'+pending.length+'筆）</td></tr>';
  html+=pending.map(h=>`<tr style="background:rgba(239,68,68,.05)">
 <td>${h.date}</td><td><strong>${h.name}</strong></td><td>${h.qty} ${h.unit}</td><td>${h.customer||'-'}</td>
 <td><span class="tag-out" style="background:rgba(239,68,68,.2);color:var(--danger)">待點收</span></td>
 <td><span style="cursor:pointer;color:#555;font-size:15px" onclick="promptDelHistory(${h.id},'pending')">🔒</span></td>
 </tr>`).join('');
 }

 // 正式歷史
 if(rows.length>0){
  if(pending.length>0){
   html+='<tr><td colspan="6" style="padding:4px"></td></tr>';
  }
  html+=rows.map(h=>`<tr>
 <td>${h.date}</td><td><strong>${h.name}</strong></td><td>${h.qty} ${h.unit}</td><td>${h.customer||'-'}</td>
 <td>${h.type==='in'?'<span class="tag-in">入庫</span>':'<span class="tag-out">出庫</span>'}</td>
 <td><span style="cursor:pointer;color:#555;font-size:15px" onclick="promptDelHistory(${h.id},'history')">🔒</span></td>
 </tr>`).join('');
 }

 tbody.innerHTML=html;
}

function promptDelHistory(id, source){
 let p=prompt('請輸入刪除密碼：');
 if(p===null) return;
 if(p!==_deletePwd){ alert('密碼錯誤'); return; }
 let d=getData();
 if(source==='pending'){
  if(d.pendingIn) d.pendingIn=d.pendingIn.filter(h=>h.id!==id);
 } else {
  let h=d.history.find(x=>x.id===id);
  if(h) h.deleted=true;
 }
 saveData(d);
 updateBadges();
 renderHistory();
}

let _prodExpanded = false;
let _editProdOldName = null;

function toggleProdMgr(){
  _prodExpanded=!_prodExpanded;
  document.getElementById('prodMgrSection').style.display=_prodExpanded?'block':'none';
  document.getElementById('toggleProdBtn').textContent=_prodExpanded?'收起':'展開';
  if(_prodExpanded) renderProdList();
}

function getProducts(){
 let d=getData();
 if(d.products.length===0){
  d.products=PRODUCTS.map(p=>({...p,stock:0,safety:50}));
  saveData(d);
 } else {
  // 確保所有預設 WP 產品都有在清單中（防止初始化被跳過）
  let names = new Set(d.products.map(p=>p.name));
  let missing = PRODUCTS.filter(p=>!names.has(p.name));
  if(missing.length>0){
   d.products = d.products.concat(missing.map(p=>({...p,stock:0,safety:50})));
   saveData(d);
  }
  // 修補所有產品的 line 欄位（從名稱前綴推斷，避免篩選失效）
  let changed = false;
  for(let p of d.products){
   if(!p.line){
    // 嘗試從名稱前綴取得產品線（如 WP-175 → WP）
    let prefix = p.name.split('-')[0];
    if(LINES.includes(prefix)){ p.line = prefix; changed = true; }
    else { p.line = 'CO'; changed = true; } // 找不到預設 CO
   }
  }
  if(changed) saveData(d);
 }
 return d.products;
}

function addProduct(){
 let name=document.getElementById('newProdName').value.trim().toUpperCase();
 let color=document.getElementById('newProdColor').value.trim().toUpperCase();
 let line=document.getElementById('newProdLine').value.trim();
 if(!name||!color) return alert('請填寫品名和顏色');
 if(!line) return alert('請選擇產品線');
 let d=getData();
 if(d.products.find(p=>p.name===name)){
  alert('產品已存在：'+name);
  return;
 }
 d.products.push({name,color,unit:'KG',line,stock:0,safety:50});
 saveData(d);
 document.getElementById('newProdName').value='';
 document.getElementById('newProdColor').value='';
 let sel=document.getElementById('newProdLine');
 let curLine=sel.value;
 sel.value='';
 renderProdList(curLine);
 alert('✅ 已新增產品：'+name+'（'+color+' / '+line+'）');
}

function editProduct(name){
 let prod=getProducts().find(p=>p.name===name);
 if(!prod) return;
 _editProdOldName=name;
 document.getElementById('editProdNameOld').value=name;
 document.getElementById('editProdName').value=prod.name;
 document.getElementById('editProdColor').value=prod.color;
 document.getElementById('editProdLine').value=prod.line||'';
 document.getElementById('prodEditSection').style.display='block';
}

function cancelEditProd(){
 _editProdOldName=null;
 document.getElementById('prodEditSection').style.display='none';
 document.getElementById('editProdNameOld').value='';
 document.getElementById('editProdName').value='';
 document.getElementById('editProdColor').value='';
 document.getElementById('editProdLine').value='';
}

function saveEditProd(){
 if(!_editProdOldName) return;
 let newName=document.getElementById('editProdName').value.trim().toUpperCase();
 let newColor=document.getElementById('editProdColor').value.trim().toUpperCase();
 let newLine=document.getElementById('editProdLine').value.trim();
 if(!newName||!newColor) return alert('請填寫品名和顏色');
 if(!newLine) return alert('請選擇產品線');
 let d=getData();
 let prod=d.products.find(p=>p.name===_editProdOldName);
 if(!prod) return;
 if(newName!==_editProdOldName && d.products.find(p=>p.name===newName)){
  alert('產品名稱已存在：'+newName);
  return;
 }
 prod.name=newName;
 prod.color=newColor;
 prod.line=newLine;
 d.history.forEach(h=>{if(h.name===_editProdOldName) h.name=newName;});
 saveData(d);
 cancelEditProd();
 let sel=document.getElementById('newProdLine');
 renderProdList(sel?sel.value:'');
 alert('✅ 已修改產品：'+newName+'（'+newColor+' / '+newLine+'）');
}

function renderProdList(lineFilter){
 let prods=getProducts();
 if(lineFilter) prods=prods.filter(p=>p.line===lineFilter);
 let el=document.getElementById('prodList');
 el.innerHTML=prods.map(p=>`<span class="cat-tag">${p.name} <span style="color:#a09080">${p.color}</span> <span style="background:rgba(106,191,74,.15);color:#6abf4a;padding:1px 6px;border-radius:6px;font-size:11px">${p.line||'未分類'}</span> <span style="cursor:pointer;color:#6abf4a;font-size:14px" onclick="editProduct('${p.name}')">⚏</span> <span style="cursor:pointer;color:#555;font-size:13px" onclick="promptDelete('${p.name}')">🔒</span></span>`).join('');
}
