<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>國研化工 | 倉儲管理系統 v4（管理版）</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0d0a08;--surface:rgba(30,24,18,0.65);--surface-solid:#1e1810;
--border:rgba(255,220,180,0.1);--text:#e8dfd0;
--accent:#6abf4a;--danger:#e05050;--warn:#d4850a;
--btn-bg:rgba(30,24,18,0.7);--btn-text:#e8dfd0;--btn-radius:16px;
--glass:rgba(30,24,18,0.5);--glass-border:rgba(255,220,180,0.15);
}
html,body{height:100%}
body{
 font-family:'Microsoft JhengHei','PingFang TC',sans-serif;
 background: linear-gradient(135deg,#0d0a08 0%,#1e1810 50%,#0d0a08 100%);
 color:var(--text);
 display:flex;flex-direction:column;min-height:100dvh
}
.glass{
 background:var(--glass);
 backdrop-filter:blur(12px);
 -webkit-backdrop-filter:blur(12px);
 border:1px solid var(--glass-border);
 border-radius:var(--btn-radius);
}

/* 頁面容器 */
.page{display:none;flex-direction:column;min-height:100dvh;padding:16px;gap:12px}
.page.active{display:flex}

/* 登入畫面 */
#loginPage{justify-content:center;align-items:center;gap:20px}
.login-box{
 background:rgba(30,24,18,0.85);
 backdrop-filter:blur(16px);
 -webkit-backdrop-filter:blur(16px);
 border:1px solid rgba(255,220,180,0.2);
 border-radius:24px;
 padding:36px 32px;
 width:min(400px,92vw);
 text-align:center;
 box-shadow:0 8px 32px rgba(0,0,0,0.5);
}
.login-box h2{font-size:24px;margin-bottom:8px;letter-spacing:2px;color:#e8dfd0}
.login-box .sub{font-size:13px;color:#a09080;margin-bottom:24px}
.qr-box{margin:0 auto 20px;width:160px;height:160px;background:#1e1810;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.4)}
input[type="password"],input[type="text"],input[type="number"]{
 width:100%;padding:15px 18px;
 border:1.5px solid rgba(255,220,180,0.15);border-radius:999px;
 background:rgba(20,16,10,0.8);color:#e8dfd0;font-size:16px;font-family:inherit;outline:none;transition:border .2s
}
input::placeholder{color:#7a6a58}
input:focus{border-color:var(--accent)}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:15px 28px;border:none;border-radius:var(--btn-radius);
  font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;
  transition:transform .15s,box-shadow .15s;
  min-height:54px;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--accent);color:#0d0a08;width:100%;box-shadow:0 4px 12px rgba(106,191,74,0.25)}
.btn-outline{background:var(--glass);color:var(--text);border:1.5px solid rgba(255,220,180,0.15);padding:13px 20px;min-height:48px;backdrop-filter:blur(8px)}
.btn-danger{background:var(--danger);color:#fff;width:100%}
.btn-sm{padding:9px 16px;font-size:14px;min-height:42px}

/* 主選單 */
#menuPage{padding-top:16px;gap:16px}
.menu-title{text-align:center;padding:16px 0 6px}
.menu-title h1{font-size:26px;letter-spacing:3px;font-weight:800}
.menu-title p{font-size:14px;color:#7a6a58;margin-top:6px}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:6px 2px}
.menu-btn{
 display:flex;flex-direction:row;align-items:center;gap:14px;
 padding:18px 18px;
 background:rgba(30,24,18,0.75);
 backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
 color:#e8dfd0;border-radius:18px;
 font-size:17px;font-weight:700;cursor:pointer;
 border:1.5px solid rgba(255,220,180,0.15);
 font-family:inherit;transition:transform .15s,box-shadow .15s;
 box-shadow:0 3px 12px rgba(0,0,0,0.3);
 min-height:72px;text-align:left;
}
.menu-btn .icon{font-size:26px;flex-shrink:0}
.menu-btn:active{transform:scale(.97)}
.menu-btn.wide{grid-column:span 2}

/* 產品線篩選列 */
.line-filter{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
.line-btn{
 padding:8px 18px;border-radius:999px;font-size:14px;font-weight:700;
 background:rgba(30,24,18,0.6);border:1.5px solid rgba(255,220,180,0.12);
 color:#a09080;cursor:pointer;transition:all .15s;backdrop-filter:blur(6px);
}
.line-btn.active{background:rgba(106,191,74,.2);border-color:var(--accent);color:var(--accent)}
.line-btn:active{transform:scale(.95)}

/* 通用功能頁 */
.func-header{display:flex;align-items:center;gap:12px;padding-bottom:14px;border-bottom:1.5px solid rgba(255,220,180,0.08);margin-bottom:6px}
.back-btn{
 background:rgba(30,24,18,0.7);border:1px solid rgba(255,220,180,0.12);
 color:#e8dfd0;border-radius:10px;padding:10px 14px;font-size:18px;cursor:pointer;
 backdrop-filter:blur(8px);
}
.page-title{font-size:18px;font-weight:700}

/* 產品網格（4x4） */
.prod-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}
.prod-btn{
 display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
 padding:16px 6px;
 background:rgba(30,24,18,0.75);border:1.5px solid rgba(255,220,180,0.15);
 border-radius:14px;color:#e8dfd0;
 font-size:14px;font-weight:700;cursor:pointer;
 transition:all .15s;font-family:inherit;
 box-shadow:0 2px 8px rgba(0,0,0,0.2);
 backdrop-filter:blur(8px);
}
.prod-btn:active{transform:scale(.95);border-color:var(--accent)}
.prod-btn .name{font-size:15px;font-weight:800}
.prod-btn .color{font-size:12px;color:#a09080;font-weight:400}
.prod-btn.selected{border-color:var(--accent);background:rgba(106,191,74,.12)}

/* 庫存顯示 */
.stock-display{
 background:rgba(30,24,18,0.75);border:1.5px solid rgba(255,220,180,0.15);
 border-radius:16px;padding:20px;margin-top:14px;text-align:center;
 backdrop-filter:blur(10px);box-shadow:0 4px 16px rgba(0,0,0,0.3);
}
.stock-display .stock-num{font-size:40px;font-weight:800;color:var(--accent);margin:8px 0}
.stock-display .stock-info{font-size:13px;color:#a09080}

/* 數量輸入 */
.qty-section{margin-top:14px}
.qty-section label{font-size:14px;color:#a09080;display:block;margin-bottom:8px;font-weight:600}
.qty-row{display:flex;gap:10px;align-items:center}
.qty-row input{flex:1}
.qty-row .unit-tag{
 background:rgba(30,24,18,0.8);border:1.5px solid rgba(255,220,180,0.12);
 border-radius:999px;padding:13px 18px;font-size:15px;backdrop-filter:blur(8px);
}

/* 歷史列表 */
.hist-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:14px}
.hist-table th{text-align:left;padding:10px 8px;border-bottom:2px solid rgba(255,220,180,0.1);color:#7a6a58;font-weight:600;font-size:12px}
.hist-table td{padding:13px 8px;border-bottom:1px solid rgba(255,220,180,0.05)}
.tag-in{background:rgba(106,191,74,.15);color:var(--accent);padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600}
.tag-out{background:rgba(224,80,80,.12);color:var(--danger);padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600}

/* 類別/產品管理 */
.cat-tags{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
.cat-tag{
 display:inline-flex;align-items:center;gap:6px;
 background:rgba(30,24,18,0.75);border:1.5px solid rgba(255,220,180,0.15);
 border-radius:999px;padding:7px 14px;font-size:13px;font-weight:600;
 backdrop-filter:blur(8px);box-shadow:0 2px 6px rgba(0,0,0,0.2);
}
.cat-tag .del{color:var(--danger);cursor:pointer;font-size:15px}
.cat-add{display:flex;gap:8px;margin-top:10px}
.cat-add input{flex:1;background:rgba(20,16,10,0.8);border-color:rgba(255,220,180,0.15)}
input[type="date"]{color:#e8dfd0}

/* 空狀態 */
.empty{text-align:center;color:#aaa;padding:40px 0;font-size:14px}

/* 登出確認 */
.logout-row{display:flex;gap:10px;margin-top:auto;padding-top:14px}
.logout-row .btn{width:100%}
</style>
</head>
<body>

<!-- ═══ 登入畫面 ═══ -->
<div class="page active" id="loginPage">
  <div class="login-box">
    <h2>📦 國研化工</h2>
    <p class="sub">倉儲管理系統 v4（管理版）</p>
    <div class="qr-box" id="qrcode"></div>
    <input type="password" id="loginPwd" dir="ltr" style="text-align:left" placeholder="輸入管理員密碼" onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="btn btn-primary" style="margin-top:12px" onclick="tryLogin()">解鎖</button>
    <p id="loginErr" style="color:var(--danger);margin-top:10px;font-size:13px;display:none">密碼錯誤</p>
  </div>
</div>

<!-- ═══ 主選單 ═══ -->
<div class="page" id="menuPage">
  <div class="menu-title">
    <h1>📋 主選單</h1>
    <p>歡迎：ADMIN（國研化工）</p>
  </div>
<div class="menu-grid">
 <button class="menu-btn" onclick="showPage('stockPage')"><span class="icon">📦</span>庫存查詢</button>
 <button class="menu-btn" onclick="showPage('prodPage')"><span class="icon">🏭</span>生產作業</button>
 <button class="menu-btn" onclick="showPage('outPage')"><span class="icon">📤</span>出庫作業</button>
 <button class="menu-btn" onclick="showPage('inPage')"><span class="icon">📥</span>入庫作業</button>
 <button class="menu-btn" onclick="showPage('historyPage')"><span class="icon">📋</span>歷史紀錄</button>
 <button class="menu-btn" onclick="showPage('catPage')"><span class="icon">⚙️</span>類別管理</button>
 <button class="menu-btn" onclick="showPage('orderPage')"><span class="icon">📋</span>客戶訂單</button>
 <button class="menu-btn wide" onclick="doLogout()"><span class="icon">🚪</span>登出</button>
 </div>
  <div class="logout-row">
    <span style="font-size:12px;color:#555;align-self:center">GYC Warehouse v4.0 Admin</span>
  </div>
</div>

<!-- ═══ 庫存查詢 ═══ -->
<div class="page" id="stockPage">
 <div class="func-header">
 <button class="back-btn" onclick="showPage('menuPage')">←</button>
 <span class="page-title">📦 庫存查詢</span>
 </div>
 <input type="text" id="searchStock" placeholder="搜尋品名或顏色..." oninput="renderStock()" style="margin-top:4px">
 <div class="line-filter" id="stockLineFilter"></div>
 <div class="prod-grid" id="stockGrid"></div>
 <div class="stock-display" id="stockDisplay" style="display:none">
 <div style="font-size:14px;color:#a09080" id="stockProdName">—</div>
 <div class="stock-num" id="stockNum">0</div>
 <div class="stock-info" id="stockInfo">目前庫存</div>
 </div>
</div>

<!-- ═══ 生產作業 ═══ -->
<div class="page" id="prodPage">
 <div class="func-header">
 <button class="back-btn" onclick="showPage('menuPage')">←</button>
 <span class="page-title">🏭 生產作業</span>
 </div>
 <div class="line-filter" id="prodLineFilter"></div>
 <div class="prod-grid" id="prodGrid"></div>
 <div class="qty-section" id="prodQtySection" style="display:none">
 <label id="prodProdLabel">選擇品名</label>
 <div class="qty-row">
 <input type="number" id="prodQty" placeholder="輸入數量" min="1">
 <span class="unit-tag" id="prodUnitTag">KG</span>
 </div>
 <input type="text" id="prodBatch" placeholder="批號（選填）" style="margin-top:10px">
 <input type="date" id="prodDate" style="margin-top:10px">
 <button class="btn btn-primary" style="margin-top:14px" onclick="doProd()">✅ 確認生產</button>
 </div>
</div>

<!-- ═══ 入庫作業 ═══ -->
<div class="page" id="inPage">
 <div class="func-header">
 <button class="back-btn" onclick="showPage('menuPage')">←</button>
 <span class="page-title">📥 入庫作業</span>
 </div>
 <div class="line-filter" id="inLineFilter"></div>
 <div class="prod-grid" id="inGrid"></div>
 <div class="qty-section" id="inQtySection" style="display:none">
 <label id="inProdLabel">選擇品名</label>
 <div class="qty-row">
 <input type="number" id="inQty" placeholder="輸入數量" min="1">
 <span class="unit-tag" id="inUnitTag">KG</span>
 </div>
 <input type="text" id="inRemark" placeholder="批號 / 備註（選填）" style="margin-top:10px">
 <input type="date" id="inDate" style="margin-top:10px">
 <button class="btn btn-primary" style="margin-top:14px" onclick="doIn()">✅ 確認入庫</button>
 </div>
</div>

<!-- ═══ 出庫作業 ═══ -->
<div class="page" id="outPage">
 <div class="func-header">
 <button class="back-btn" onclick="showPage('menuPage')">←</button>
 <span class="page-title">📤 出庫作業</span>
 </div>
 <div class="line-filter" id="outLineFilter"></div>
 <div class="prod-grid" id="outGrid"></div>
 <div class="qty-section" id="outQtySection" style="display:none">
 <label id="outProdLabel">選擇品名</label>
 <div class="qty-row">
 <input type="number" id="outQty" placeholder="輸入數量" min="1">
 <span class="unit-tag" id="outUnitTag">KG</span>
 </div>
 <input type="text" id="outRemark" placeholder="用途 / 備註（選填）" style="margin-top:10px">
 <input type="date" id="outDate" style="margin-top:10px">
 <button class="btn btn-primary" style="margin-top:14px" onclick="doOut()">✅ 確認出庫</button>
 </div>
</div>

<!-- ═══ 歷史紀錄 ═══ -->
<div class="page" id="historyPage">
  <div class="func-header">
    <button class="back-btn" onclick="showPage('menuPage')">←</button>
    <span class="page-title">📋 歷史紀錄</span>
  </div>
  <input type="text" id="searchHist" placeholder="搜尋品名或備註..." oninput="renderHistory()" style="margin-top:4px">
  <div style="overflow-x:auto;margin-top:12px">
    <table class="hist-table" id="histTable">
      <thead><tr><th>日期</th><th>品名</th><th>數量</th><th>備註</th><th>作業</th><th>操作</th></tr></thead>
      <tbody id="histBody"></tbody>
    </table>
  </div>
  <div style="margin-top:20px;padding:12px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:12px">
    <p style="font-size:13px;color:#888;margin-bottom:8px">危險區域</p>
    <input type="password" id="delPwd" placeholder="刪除密碼" style="margin-bottom:8px">
    <input type="text" id="delTarget" placeholder="輸入要刪除的品名" style="margin-bottom:8px">
    <button class="btn btn-danger btn-sm" onclick="adminDelete()">管理員刪除產品</button>
  </div>
</div>

<!-- ═══ 類別管理 ═══ -->
<div class="page" id="catPage">
  <div class="func-header">
    <button class="back-btn" onclick="showPage('menuPage')">←</button>
    <span class="page-title">⚙️ 類別管理</span>
  </div>

  <!-- 產品管理 -->
  <div style="margin-bottom:24px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <span style="font-size:15px;font-weight:700">🏭 產品管理</span>
      <button class="btn btn-primary btn-sm" onclick="toggleProdMgr()" id="toggleProdBtn">展開</button>
    </div>
    <div id="prodMgrSection" style="display:none">

<!-- 新增產品 -->
<p style="font-size:13px;color:#a09080;margin-bottom:6px">➕ 新增產品</p>
<div class="cat-add">
<input type="text" id="newProdName" dir="ltr" placeholder="品名（如 TW-999）" style="flex:1;text-align:left">
<input type="text" id="newProdColor" dir="ltr" placeholder="顏色（如 BLACK）" style="flex:1;text-align:left">
<select id="newProdLine" style="padding:9px 12px;border-radius:999px;border:1.5px solid rgba(255,220,180,0.15);background:rgba(20,16,10,0.8);color:#e8dfd0;font-size:14px;min-width:90px">
<option value="">產品線</option>
<option value="TU">TU</option><option value="TW">TW</option><option value="WO">WO</option>
<option value="WP">WP</option><option value="CO">CO</option><option value="特殊">特殊</option>
</select>
<button class="btn btn-primary btn-sm" onclick="addProduct()">新增</button>
</div>

 <!-- 編輯產品 -->
 <div id="prodEditSection" style="display:none;margin-top:14px;padding:12px;background:rgba(30,24,18,0.8);border-radius:10px;border:1px solid rgba(255,220,180,0.12)">
 <p style="font-size:13px;color:#a09080;margin-bottom:6px">✏️ 編輯產品</p>
 <div class="cat-add" style="margin-bottom:8px">
 <input type="text" id="editProdNameOld" placeholder="原始品名" style="flex:1;opacity:.5" readonly>
 </div>
 <div class="cat-add" style="margin-bottom:8px">
 <input type="text" id="editProdName" placeholder="新品名" style="flex:1">
 <input type="text" id="editProdColor" placeholder="新顏色" style="flex:1">
 <select id="editProdLine" style="padding:9px 12px;border-radius:999px;border:1.5px solid rgba(255,220,180,0.15);background:rgba(20,16,10,0.8);color:#e8dfd0;font-size:14px;min-width:90px">
 <option value="">產品線</option>
 <option value="TU">TU</option><option value="TW">TW</option><option value="WO">WO</option>
 <option value="WP">WP</option><option value="CO">CO</option><option value="特殊">特殊</option>
 </select>
 </div>
 <div style="display:flex;gap:8px;justify-content:flex-end">
 <button class="btn btn-outline btn-sm" onclick="cancelEditProd()">取消</button>
 <button class="btn btn-primary btn-sm" onclick="saveEditProd()">💾 儲存修改</button>
 </div>
 </div>

      <!-- 產品列表 -->
      <p style="font-size:13px;color:#888;margin:12px 0 6px">目前產品（點編輯 ⚏ / 刪除 ✕）</p>
      <div id="prodList" style="display:flex;flex-wrap:wrap;gap:8px"></div>
    </div>
  </div>

  <!-- 類別管理 -->
  <p style="font-size:15px;font-weight:700;margin-bottom:10px">📂 類別管理</p>
  <p style="font-size:13px;color:#888;margin-bottom:4px">點擊 ✕ 刪除類別</p>
  <div class="cat-tags" id="catList"></div>
  <div class="cat-add">
    <input type="text" id="newCatInput" dir="ltr" placeholder="新增類別名稱" style="text-align:left">
    <button class="btn btn-primary btn-sm" onclick="addCategory()">➕ 新增</button>
  </div>
</div>

<!-- ═══ 客戶訂單 ═══ -->
<div class="page" id="orderPage">
  <div class="func-header">
    <button class="back-btn" onclick="showPage('menuPage')">←</button>
    <span class="page-title">📋 客戶訂單</span>
  </div>

  <div style="padding:14px 4px 0">
    <p style="font-size:13px;color:#a09080;margin-bottom:6px">📌 貼上 AI 解析後的 JSON 資料</p>
    <textarea id="orderJson" rows="5" placeholder='{"pono":"SFCPO...","factory":"廠別","prno":"BALPR...","items":[{"name":"品名","qty":數量}]}'
      style="width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid rgba(255,220,180,0.15);background:rgba(20,16,10,0.8);color:#e8dfd0;font-size:13px;resize:vertical;font-family:inherit;box-sizing:border-box"></textarea>

    <button class="btn btn-primary" style="margin-top:10px;width:100%" onclick="parseOrderJson()">🔍 解析資料</button>

    <div id="orderPreview" style="display:none;margin-top:14px">
      <p style="font-size:14px;font-weight:700;margin-bottom:8px">📦 解析結果</p>
      <div style="font-size:13px;color:#a09080;margin-bottom:10px">
        採購單：<span id="opPono" style="color:#e8dfd0"></span>，
        廠別：<span id="opFactory" style="color:#e8dfd0"></span>，
        PR NO：<span id="opPrno" style="color:#e8dfd0"></span>
      </div>
      <div id="opItems" style="display:flex;flex-direction:column;gap:6px"></div>
      <button class="btn btn-primary" style="margin-top:12px;width:100%;background:rgba(106,191,74,0.25)" onclick="generateOrderPdf()">🖨️ 生成 PDF 標籤</button>
    </div>

    <div id="orderMsg" style="display:none;margin-top:10px;font-size:13px;text-align:center;border-radius:8px;padding:8px"></div>
  </div>
</div>

<script src="qrcode.min.js"></script>
<script>
// ════════════════════════════════════════
// 設定
// ════════════════════════════════════════
const PWD_ADMIN = 'root';
const API_URL = 'https://script.google.com/macros/s/AKfycbxdcYdO4hdoNJf_DncVgRFH6HrapuG9Qszc3whA4apsNnOMQJe0d2a5LFewbhlZJcFw-Q/exec';

// ════════════════════════════════════════
// 工具函數
// ════════════════════════════════════════
function api(action,params={}){
  return new Promise((res,rej)=>{
    let url = API_URL+'?action='+action;
    for(let k in params) url+='&'+encodeURIComponent(k)+'='+encodeURIComponent(params[k]);
    fetch(url).then(r=>r.json()).then(res).catch(rej);
  });
}

function getData(){
  if(_cachedData) return _cachedData;
  try{let x=localStorage.getItem(STORAGE_KEY);if(x){_cachedData=JSON.parse(x);return _cachedData}}catch(e){}
  return {products:[],history:[]};
}

function saveData(d){
  _cachedData=d;
  try{
    let prev={products:[],history:[]};
    let old=localStorage.getItem(STORAGE_KEY);
    if(old)try{prev=JSON.parse(old)}catch(e){}
    let merged={products:d.products||prev.products||[],history:d.history||prev.history||[]};
    localStorage.setItem(STORAGE_KEY,JSON.stringify(merged));
  }catch(e){}
}

function getTypes(){
  if(_categories) return _categories;
  try{let x=localStorage.getItem(CAT_KEY);if(x){_categories=JSON.parse(x);return _categories}}catch(e){}
  _categories=['原料','成品','其他'];
  return _categories;
}

function saveCategories(cats){
  _categories=cats;
  try{localStorage.setItem(CAT_KEY,JSON.stringify(cats))}catch(e){}
}

function calcStock(name){
  let d=getData();
  let stock=0;
  for(let h of d.history){
    if(h.deleted) continue;
    if(h.name!==name) continue;
    stock += (h.type==='in'?h.qty:-h.qty);
  }
  return stock;
}

function showPage(id){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 if(id==='stockPage'){renderLineFilter('stockLineFilter');renderStock();}
 if(id==='prodPage'){renderLineFilter('prodLineFilter');renderProdGrid();}
 if(id==='inPage'){renderLineFilter('inLineFilter');renderInGrid();}
 if(id==='outPage'){renderLineFilter('outLineFilter');renderOutGrid();}
 if(id==='historyPage') renderHistory();
 if(id==='catPage') renderCat();
}

function tryLogin(){
  let p=document.getElementById('loginPwd').value;
  if(p!==PWD_ADMIN){
    document.getElementById('loginErr').style.display='block';
    return;
  }
  document.getElementById('loginErr').style.display='none';
  document.getElementById('loginPage').classList.remove('active');
  document.getElementById('menuPage').classList.add('active');
  initApp();
}

function doLogout(){
  if(!confirm('確定要登出？')) return;
  showPage('loginPage');
  document.getElementById('loginPwd').value='';
}

// ════════════════════════════════════════
// 初始化
// ════════════════════════════════════════
async function initApp(){
  // 初始化產品（如果空白）
  let d=getData();
  if(d.products.length===0){
    d.products=PRODUCTS.map(p=>({...p,stock:0,safety:50}));
    saveData(d);
  }
  // 預設日期
  document.getElementById('inDate').value=today;
  document.getElementById('inDate').max=today;
}

// ════════════════════════════════════════
// 渲染產品網格
// ════════════════════════════════════════
function buildProdGrid(containerId, onSelect){
 let container=document.getElementById(containerId);
 container.innerHTML='';
 let prods=getProducts();
 if(_filterLine) prods=prods.filter(p=>p.line===_filterLine);
 console.log('buildGrid',containerId,'filterLine:',_filterLine,'count:',prods.length);
 for(let p of prods){
  let btn=document.createElement('button');
  btn.className='prod-btn';
  btn.innerHTML=`<span class="name">${p.name}</span><span class="color">${p.color}</span>`;
  btn.onclick=()=>{
   document.querySelectorAll('#'+containerId+' .prod-btn.selected').forEach(b=>b.classList.remove('selected'));
   btn.classList.add('selected');
   if(onSelect) onSelect(p);
  };
  container.appendChild(btn);
 }
}

function renderCatTags(containerId, onFilter){
  let container=document.getElementById(containerId);
  let cats=getTypes();
  container.innerHTML='';
  let first=document.createElement('span');
  first.className='cat-tag';
  first.style.cursor='pointer';
  first.textContent='全部';
  first.onclick=()=>{filterCat='';renderProdGrid();};
  container.appendChild(first);
  for(let c of cats){
    let tag=document.createElement('span');
    tag.className='cat-tag';
    tag.style.cursor='pointer';
    tag.textContent=c;
    tag.onclick=()=>{filterCat=c;renderProdGrid();};
    container.appendChild(tag);
  }
}

let filterCat='';
let _filterLine=''; // 全域產品線篩選

function renderLineFilter(containerId, onSelect){
 let container=document.getElementById(containerId);
 container.innerHTML='';
 let btn=document.createElement('button');
 btn.className='line-btn'+(_filterLine===''?' active':'');
 btn.textContent='全部';
 btn.onclick=()=>{_filterLine='';renderAllGrids();renderLineFilter(containerId);};
 container.appendChild(btn);
 for(let line of LINES){
  let b=document.createElement('button');
  b.className='line-btn'+(_filterLine===line?' active':'');
  b.textContent=line;
  b.onclick=()=>{_filterLine=line;renderAllGrids();renderLineFilter(containerId);};
  container.appendChild(b);
 }
}

function renderAllGrids(){
 buildProdGrid('stockGrid',null);
 buildProdGrid('prodGrid',null);
 buildProdGrid('inGrid',null);
 buildProdGrid('outGrid',null);
}

// ════════════════════════════════════════
// 庫存查詢
// ════════════════════════════════════════
function renderStock(){
  buildProdGrid('stockGrid',(p)=>{
    let stock=calcStock(p.name);
    let d=getData();
    let prod=d.products.find(x=>x.name===p.name);
    let safety=prod?prod.safety:50;
    document.getElementById('stockDisplay').style.display='block';
    document.getElementById('stockProdName').textContent=p.name+'（'+p.color+'）';
    document.getElementById('stockNum').textContent=stock.toLocaleString();
    let status=stock<=safety?'低於存量':'正常';
    let color=stock<=safety?'var(--danger)':'var(--accent)';
    document.getElementById('stockInfo').innerHTML=`目前庫存（安全存量：${safety}）<br><span style="color:${color};font-size:13px">${status}</span>`;
  });
}

// 入庫作業
// ════════════════════════════════════════
function renderInGrid(){
  buildProdGrid('inGrid',(p)=>{
    _selectedProd=p;
    document.getElementById('inQtySection').style.display='block';
    document.getElementById('inProdLabel').textContent=p.name+'（'+p.color+'）';
    document.getElementById('inUnitTag').textContent=p.unit;
    document.getElementById('inQty').value='';
    document.getElementById('inRemark').value='';
  });
}

async function doIn(){
  if(!_selectedProd) return alert('請選擇品名');
  let qty=parseFloat(document.getElementById('inQty').value);
  if(!qty||qty<=0) return alert('請填寫數量');
  let d=getData();
  let rec={id:Date.now(),type:'in',name:_selectedProd.name,model:_selectedProd.color,qty,unit:_selectedProd.unit,customer:document.getElementById('inRemark').value||'-',date:document.getElementById('inDate').value||today};
  d.history.unshift(rec);
  saveData(d);
  try{await api('addHistory',{record:JSON.stringify(rec)})}catch(e){}
  alert('✅ 入庫成功！\n品名：'+_selectedProd.name+'\n數量：'+qty+' '+_selectedProd.unit);
  document.getElementById('inQtySection').style.display='none';
  document.querySelectorAll('#inGrid .prod-btn').forEach(b=>b.classList.remove('selected'));
  _selectedProd=null;
  renderInGrid();
}

async function doOut(){

  if(!qty||qty<=0) return alert('請填寫數量');

  if(qty>stock) return alert('庫存不足！\n目前庫存：'+stock+' '+_selectedProd.unit);
  let d=getData();
  let rec={id:Date.now(),type:'out',name:_selectedProd.name,model:_selectedProd.color,qty,unit:_selectedProd.unit,customer:document.getElementById('outRemark').value||'-',date:document.getElementById('outDate').value||today};
  d.history.unshift(rec);
  saveData(d);
  try{await api('addHistory',{record:JSON.stringify(rec)})}catch(e){}
  alert('✅ 出庫成功！\n品名：'+_selectedProd.name+'\n數量：'+qty+' '+_selectedProd.unit);

// ════════════════════════════════════════
// 歷史紀錄
// ════════════════════════════════════════
function renderHistory(){
  let d=getData();
  let kw=document.getElementById('searchHist').value.toLowerCase();
  let rows=d.history.filter(h=>!h.deleted&&(!kw||h.name.toLowerCase().includes(kw)||(h.customer&&h.customer.toLowerCase().includes(kw))));
  let tbody=document.getElementById('histBody');
  if(rows.length===0){tbody.innerHTML='<tr><td colspan="6" class="empty">尚無記錄</td></tr>';return;}
  tbody.innerHTML=rows.map(h=>`<tr>
    <td>${h.date}</td><td><strong>${h.name}</strong></td><td>${h.qty} ${h.unit}</td><td>${h.customer||'-'}</td>
    <td>${h.type==='in'?'<span class="tag-in">入庫</span>':'<span class="tag-out">出庫</span>'}</td>
    <td><button class="btn btn-outline btn-sm" onclick="delHistory(${h.id})" style="color:var(--danger);border-color:var(--danger)">刪除</button></td>
  </tr>`).join('');
}

function delHistory(id){
  if(document.getElementById('delPwd').value!=='1234') return alert('密碼錯誤');
  let d=getData();
  let h=d.history.find(x=>x.id===id);
  if(h) h.deleted=true;
  saveData(d);
  document.getElementById('delPwd').value='';
  renderHistory();
}

function adminDelete(){
  if(document.getElementById('delPwd').value!=='admin') return alert('密碼錯誤');
  let name=document.getElementById('delTarget').value.trim();
  if(!name) return;
  let d=getData();
  d.products=d.products.filter(p=>p.name!==name);
  saveData(d);
  document.getElementById('delTarget').value='';
  alert('已刪除產品：'+name);
}

let _prodExpanded = false;
let _editProdOldName = null;

function toggleProdMgr(){
  _prodExpanded=!_prodExpanded;
  document.getElementById('prodMgrSection').style.display=_prodExpanded?'block':'none';
  document.getElementById('toggleProdBtn').textContent=_prodExpanded?'收起':'展開';
  if(_prodExpanded) renderProdList();
}

function getProducts(){
  let d=getData();
  if(d.products.length===0){
    d.products=PRODUCTS.map(p=>({...p,stock:0,safety:50}));
    saveData(d);
  }
  return d.products;
}

function addProduct(){
 let name=document.getElementById('newProdName').value.trim().toUpperCase();
 let color=document.getElementById('newProdColor').value.trim().toUpperCase();
 let line=document.getElementById('newProdLine').value.trim();
 if(!name||!color) return alert('請填寫品名和顏色');
 if(!line) return alert('請選擇產品線');
 let d=getData();
 if(d.products.find(p=>p.name===name)){
  alert('產品已存在：'+name);
  return;
 }
 d.products.push({name,color,unit:'KG',line,stock:0,safety:50});
 saveData(d);
 document.getElementById('newProdName').value='';
 document.getElementById('newProdColor').value='';
 document.getElementById('newProdLine').value='';
 renderProdList();
 alert('✅ 已新增產品：'+name+'（'+color+' / '+line+'）');
}

function editProduct(name){
 let prod=getProducts().find(p=>p.name===name);
 if(!prod) return;
 _editProdOldName=name;
 document.getElementById('editProdNameOld').value=name;
 document.getElementById('editProdName').value=prod.name;
 document.getElementById('editProdColor').value=prod.color;
 document.getElementById('editProdLine').value=prod.line||'';
 document.getElementById('prodEditSection').style.display='block';
}

function cancelEditProd(){
 _editProdOldName=null;
 document.getElementById('prodEditSection').style.display='none';
 document.getElementById('editProdNameOld').value='';
 document.getElementById('editProdName').value='';
 document.getElementById('editProdColor').value='';
 document.getElementById('editProdLine').value='';
}

function saveEditProd(){
 if(!_editProdOldName) return;
 let newName=document.getElementById('editProdName').value.trim().toUpperCase();
 let newColor=document.getElementById('editProdColor').value.trim().toUpperCase();
 let newLine=document.getElementById('editProdLine').value.trim();
 if(!newName||!newColor) return alert('請填寫品名和顏色');
 if(!newLine) return alert('請選擇產品線');
 let d=getData();
 let prod=d.products.find(p=>p.name===_editProdOldName);
 if(!prod) return;
 if(newName!==_editProdOldName && d.products.find(p=>p.name===newName)){
  alert('產品名稱已存在：'+newName);
  return;
 }
 prod.name=newName;
 prod.color=newColor;
 prod.line=newLine;
 d.history.forEach(h=>{if(h.name===_editProdOldName) h.name=newName;});
 saveData(d);
 cancelEditProd();
 renderProdList();
 alert('✅ 已修改產品：'+newName+'（'+newColor+' / '+newLine+'）');
}

function renderProdList(){
 let prods=getProducts();
 let el=document.getElementById('prodList');
 el.innerHTML=prods.map(p=>`<span class="cat-tag">${p.name} <span style="color:#a09080">${p.color}</span> <span style="background:rgba(106,191,74,.15);color:#6abf4a;padding:1px 6px;border-radius:6px;font-size:11px">${p.line||'未分類'}</span> <span style="cursor:pointer;color:#6abf4a;font-size:14px" onclick="editProduct('${p.name}')">⚏</span> <span class="del" onclick="deleteProduct('${p.name}')">✕</span></span>`).join('');
}

function deleteProduct(name){
  if(!confirm('確定刪除產品「'+name+'」？')) return;
  let d=getData();
  d.products=d.products.filter(p=>p.name!==name);
  saveData(d);
  renderProdList();
}

function renderCat(){
  let cats=getTypes();
  let list=document.getElementById('catList');
  list.innerHTML=cats.map(c=>`<span class="cat-tag">${c} <span class="del" onclick="deleteCategory('${c}')">✕</span></span>`).join('');

function addCategory(){
  let v=document.getElementById('newCatInput').value.trim();
  if(!v) return;
  let cats=getTypes();
  if(cats.includes(v)) return alert('類別已存在');
  cats.push(v);
  saveCategories(cats);
  document.getElementById('newCatInput').value='';
  renderCat();
  alert('已新增：「'+v+'」');
}

function deleteCategory(c){
  if(!confirm('確定刪除類別「'+c+'」？')) return;
  let cats=getTypes().filter(x=>x!==c);
  saveCategories(cats);
  renderCat();
}

let _orderData = null;
const PROXY_HOST = 'localhost';
const PROXY_PORT = '5000';

function parseOrderJson(){
  const raw = document.getElementById('orderJson').value.trim();
  if(!raw) return showOrderMsg('⚠️ 請先貼上 JSON 資料', '#ff6b6b');
  try {
    _orderData = JSON.parse(raw);
  } catch(e){
    return showOrderMsg('❌ JSON 格式錯誤：'+e.message, '#ff6b6b');
  }
  const d = _orderData;
  if(!d.items || !Array.isArray(d.items) || d.items.length===0)
    return showOrderMsg('❌ 缺少 items 陣列', '#ff6b6b');
  document.getElementById('opPono').textContent = d.pono || '—';
  document.getElementById('opFactory').textContent = d.factory || '—';
  document.getElementById('opPrno').textContent = d.prno || '—';
  const itemsEl = document.getElementById('opItems');
  itemsEl.innerHTML = d.items.map(it =>
    `<div style="background:rgba(30,24,18,0.6);border:1px solid rgba(255,220,180,0.1);border-radius:8px;padding:8px 12px;font-size:13px">
      <span style="color:#e8dfd0;font-weight:600">${it.name}</span>
      <span style="color:#a09080;margin-left:8px">${it.qty} KG</span>
    </div>`
  ).join('');
  document.getElementById('orderPreview').style.display = 'block';
  showOrderMsg('✅ 解析成功，共 '+d.items.length+' 項', '#6bff6b');
}

function generateOrderPdf(){
  if(!_orderData) return showOrderMsg('⚠️ 請先解析資料', '#ff6b6b');
  showOrderMsg('⏳ 正在生成 PDF...', '#ffe066');
  const url = `http://${PROXY_HOST}:${PROXY_PORT}/generate_customer_pdf`;
  fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(_orderData)
  })
  .then(r => {
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.blob();
  })
  .then(blob => {
    const a = document.createElement('a');
    const url2 = URL.createObjectURL(blob);
    a.href = url2;
    a.download = 'customer_labels.pdf';
    a.click();
    URL.revokeObjectURL(url2);
    showOrderMsg('✅ PDF 已下載', '#6bff6b');
  })
  .catch(e => {
    showOrderMsg('❌ 失敗：'+e.message+'\n請確認本機 AI 分析服務已啟動', '#ff6b6b');
  });
}

function showOrderMsg(text, color){
  const el = document.getElementById('orderMsg');
  el.textContent = text;
  el.style.color = color;
  el.style.background = color+'22';
  el.style.border = '1px solid '+color+'44';
  el.style.display = 'block';
  setTimeout(()=>{ el.style.display='none'; }, 5000);
}
