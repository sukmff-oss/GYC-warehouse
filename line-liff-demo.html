<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🚗 粉紅超跑點餐服務</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, '微軟正黑體', sans-serif; background: #fff5f8; min-height: 100vh; padding-bottom: 80px; }

    .header {
      background: linear-gradient(135deg, #ff8fab 0%, #ff4d6d 100%);
      color: white;
      padding: 12px 16px 10px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before { content: '🚗'; position: absolute; top: 6px; left: 12px; font-size: 1.8rem; opacity: 0.4; }
    .header h1 { font-size: 0.9rem; font-weight: bold; letter-spacing: 1px; }
    .header small { display: block; font-size: 0.75rem; opacity: 0.9; margin-top: 2px; }

    .notice {
      margin: 10px 12px 0;
      padding: 10px 12px;
      background: linear-gradient(135deg, #fff0f5, #fff);
      border-radius: 12px;
      font-size: 0.8rem;
      color: #c9184a;
      border: 2px solid #ffb3c6;
      text-align: center;
    }
    .notice strong { font-size: 0.9rem; }

    .order-list { padding: 10px 12px; display: flex; flex-direction: column; gap: 12px; }

    .category {
      background: white;
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 2px 10px rgba(255,77,109,0.08);
      border: 1px solid #ffe4ec;
    }
    .category-title {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.95rem;
      font-weight: bold;
      color: #c9184a;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 2px dashed #ffb3c6;
    }

    .order-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #f8f8f8;
    }
    .order-item:last-child { border-bottom: none; }

    .item-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: linear-gradient(135deg, #fff0f5, #ffe4ec);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
      border: 2px solid #ffb3c6;
    }
    .item-info { flex: 1; }
    .item-name { font-size: 0.9rem; font-weight: bold; color: #2d2d2d; }
    .item-price { font-size: 0.8rem; color: #e63973; margin-top: 2px; font-weight: bold; }

    .qty-control { display: flex; align-items: center; gap: 8px; }
    .qty-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .qty-btn.minus { background: #f5f5f5; color: #999; border: 2px solid #eee; }
    .qty-btn.plus { background: linear-gradient(135deg, #ff8fab, #ff4d6d); color: white; border: none; }
    .qty-num { font-size: 1rem; font-weight: bold; min-width: 28px; text-align: center; color: #c9184a; }

    .location-section {
      margin: 0 12px;
      background: white;
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 2px 10px rgba(255,77,109,0.08);
      border: 2px solid #ffb3c6;
    }
    .location-title {
      font-size: 0.95rem;
      font-weight: bold;
      color: #c9184a;
      margin-bottom: 10px;
    }
    .location-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .location-btn {
      padding: 10px;
      border: 2px solid #ffe4ec;
      border-radius: 10px;
      background: white;
      font-size: 0.9rem;
      font-weight: bold;
      color: #666;
    }
    .location-btn.selected {
      border-color: #ff4d6d;
      background: linear-gradient(135deg, #ff8fab, #ff4d6d);
      color: white;
    }

    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      padding: 10px 16px;
      box-shadow: 0 -4px 15px rgba(255,77,109,0.15);
      display: flex;
      align-items: center;
      gap: 12px;
      border-top: 2px solid #ffe4ec;
    }
    .total-section { flex: 1; }
    .total-label { font-size: 0.75rem; color: #999; }
    .total-price { font-size: 1.3rem; font-weight: bold; color: #e63973; }
    .submit-btn {
      background: linear-gradient(135deg, #ff8fab, #ff4d6d);
      color: white;
      border: none;
      border-radius: 25px;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(255,77,109,0.4);
    }
    .submit-btn:disabled { background: #ddd; box-shadow: none; cursor: not-allowed; }
  </style>
</head>
<body>

<div class="header">
  <h1>🚗 粉紅超跑點餐服務</h1>
  <small>外送專線：09-09-09-2299</small>
  <a href="line-liff-demo.html" style="position:absolute;top:6px;right:8px;"><img src="粉紅超跑點餐QRCode.png" width="40" height="40" style="border-radius:8px;border:2px solid white;"></a>
</div>

<div class="notice">
  ⚠️ <strong>今日開放點餐至 11:00</strong>，逾時不候
</div>

<div class="order-list" id="orderList"></div>

<div class="location-section">
  <div class="location-title">📍 選擇外送地區</div>
  <div class="location-grid">
    <button class="location-btn" onclick="selectLocation('蘆竹區', this)">1️⃣ 蘆竹區</button>
    <button class="location-btn" onclick="selectLocation('大園區', this)">2️⃣ 大園區</button>
    <button class="location-btn" onclick="selectLocation('大湳區', this)">3️⃣ 大湳區</button>
    <button class="location-btn" onclick="selectLocation('中壢區', this)">4️⃣ 中壢區</button>
  </div>
</div>

<div style="height: 80px;"></div>

<div class="bottom-bar">
  <div class="total-section">
    <div class="total-label">訂單合計</div>
    <div class="total-price">$<span id="totalAmount">0</span></div>
  </div>
  <button class="submit-btn" id="submitBtn" onclick="submitOrder()" disabled>送出訂單</button>
</div>

<script>
const menu = [
  { category: '🍜 麵食', items: [
    { id: 1, name: '泡麵', price: 60, icon: '🍜' },
    { id: 2, name: '涼麵', price: 50, icon: '🥗' },
  ]},
  { category: '🍚 飯類', items: [
    { id: 3, name: '排骨便當', price: 100, icon: '🍱' },
    { id: 4, name: '雞腿便當', price: 100, icon: '🍗' },
  ]},
  { category: '🍗 炸物', items: [
    { id: 5, name: '炸雞排', price: 70, icon: '🍗' },
    { id: 6, name: '薯條', price: 40, icon: '🍟' },
    { id: 7, name: '炸雞翅', price: 40, icon: '🍗' },
  ]},
  { category: '🥢 滷味', items: [
    { id: 8, name: '滷蛋', price: 15, icon: '🥚' },
    { id: 9, name: '豆干', price: 15, icon: '🟤' },
    { id: 10, name: '鴨頭', price: 30, icon: '🦆' },
  ]},
  { category: '🥚 蔥油蛋餅', items: [
    { id: 11, name: '蔥油餅', price: 35, icon: '🫓' },
    { id: 12, name: '蛋餅', price: 35, icon: '🥚' },
    { id: 13, name: '蔥抓餅', price: 40, icon: '🫓' },
  ]},
  { category: '🧋 飲料', items: [
    { id: 14, name: '冰飲', price: 35, icon: '🧋' },
    { id: 15, name: '咖啡', price: 40, icon: '☕' },
    { id: 16, name: '手工搖飲', price: 50, icon: '🥤' },
  ]},
  { category: '📦 其他', items: [
    { id: 17, name: '香菸', price: 100, icon: '🚬' },
    { id: 18, name: '檳榔', price: 50, icon: '🟢' },
  ]},
];

const orders = {};
let total = 0;
let selectedLocation = '';

function renderMenu() {
  const list = document.getElementById('orderList');
  list.innerHTML = menu.map(cat => `
    <div class="category">
      <div class="category-title">${cat.category}</div>
      ${cat.items.map(item => `
        <div class="order-item">
          <div class="item-icon">${item.icon}</div>
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-price">$${item.price}</div>
          </div>
          <div class="qty-control">
            <button class="qty-btn minus" onclick="changeQty(${item.id}, -1)">−</button>
            <span class="qty-num" id="qty-${item.id}">0</span>
            <button class="qty-btn plus" onclick="changeQty(${item.id}, 1)">+</button>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function selectLocation(location, btn) {
  selectedLocation = location;
  document.querySelectorAll('.location-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  checkSubmit();
}

function changeQty(id, delta) {
  if (!orders[id]) orders[id] = 0;
  orders[id] = Math.max(0, orders[id] + delta);
  document.getElementById('qty-' + id).textContent = orders[id];
  recalc();
}

function recalc() {
  total = menu.flatMap(c => c.items).reduce((sum, item) => sum + (orders[item.id] || 0) * item.price, 0);
  document.getElementById('totalAmount').textContent = total;
  checkSubmit();
}

function checkSubmit() {
  const hasItems = menu.flatMap(c => c.items).some(item => orders[item.id] > 0);
  document.getElementById('submitBtn').disabled = !(hasItems && selectedLocation);
}

const API_BASE = 'https://gyc-warehouse.onrender.com';

function submitOrder() {
  if (total === 0 || !selectedLocation) return;
  const orderItems = menu.flatMap(c => c.items).filter(item => (orders[item.id] || 0) > 0).map(item => ({ name: item.name, price: item.price, qty: orders[item.id] }));
  const orderData = { items: orderItems, total: total, location: selectedLocation, time: new Date().toLocaleString('zh-TW') };
  const btn = document.getElementById('submitBtn');
  btn.textContent = '傳送中...';
  btn.disabled = true;
  fetch(API_BASE + '/order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(orderData) })
  .then(r => r.json())
  .then(res => {
    if (res.success) { alert('✅ 訂單已送出！\n\n外送地區：' + selectedLocation + '\n您的手機將收到 LINE 通知。'); }
    else { alert('❌ 傳送失敗：' + (res.error || '未知錯誤')); }
    Object.keys(orders).forEach(k => orders[k] = 0);
    menu.flatMap(c => c.items).forEach(item => { document.getElementById('qty-' + item.id).textContent = '0'; });
    document.querySelectorAll('.location-btn').forEach(b => b.classList.remove('selected'));
    selectedLocation = '';
    recalc();
  })
  .catch(err => { alert('❌ 網路錯誤：' + err); btn.textContent = '送出訂單'; btn.disabled = false; });
}

renderMenu();
</script>
</body>
</html>
