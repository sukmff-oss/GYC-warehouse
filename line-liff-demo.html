<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🐝 粉紅超跑點餐外送</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, '微軟正黑體', sans-serif; background: #fff5f8; min-height: 100vh; padding-bottom: 90px; }

    .header {
      background: linear-gradient(135deg, #ff8fab 0%, #ff4d6d 100%);
      color: white;
      padding: 24px 20px 16px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before { content: '🐝'; position: absolute; top: 8px; left: 20px; font-size: 2.5rem; opacity: 0.4; }
    .header::after { content: '⚡'; position: absolute; top: 8px; right: 20px; font-size: 2rem; opacity: 0.4; }
    .header h1 { font-size: 1.5rem; font-weight: bold; letter-spacing: 2px; }
    .header small { display: block; font-size: 0.85rem; opacity: 0.9; margin-top: 6px; }

    .notice {
      margin: 16px 16px 0;
      padding: 14px 16px;
      background: linear-gradient(135deg, #fff0f5, #fff);
      border-radius: 16px;
      font-size: 0.9rem;
      color: #c9184a;
      border: 2px solid #ffb3c6;
      text-align: center;
      box-shadow: 0 4px 12px rgba(255,77,109,0.1);
    }
    .notice strong { font-size: 1.1rem; }

    .order-list { padding: 16px; display: flex; flex-direction: column; gap: 20px; }

    .category {
      background: white;
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 4px 20px rgba(255,77,109,0.08);
      border: 1px solid #ffe4ec;
    }
    .category-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      color: #c9184a;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 2px dashed #ffb3c6;
    }
    .category-title span { font-size: 1.4rem; }

    .order-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f8f8f8;
    }
    .order-item:last-child { border-bottom: none; padding-bottom: 0; }
    .order-item:first-of-type { padding-top: 0; }

    .item-icon {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      background: linear-gradient(135deg, #fff0f5, #ffe4ec);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      flex-shrink: 0;
      border: 2px solid #ffb3c6;
    }
    .item-info { flex: 1; }
    .item-name { font-size: 1rem; font-weight: bold; color: #2d2d2d; }
    .item-price { font-size: 0.9rem; color: #e63973; margin-top: 2px; font-weight: bold; }

    .qty-control { display: flex; align-items: center; gap: 10px; }
    .qty-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .qty-btn.minus { background: #f5f5f5; color: #999; border: 2px solid #eee; }
    .qty-btn.plus { background: linear-gradient(135deg, #ff8fab, #ff4d6d); color: white; border: none; box-shadow: 0 3px 10px rgba(255,77,109,0.3); }
    .qty-btn:active { transform: scale(0.9); }
    .qty-num { font-size: 1.1rem; font-weight: bold; min-width: 32px; text-align: center; color: #c9184a; }

    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      padding: 14px 20px;
      box-shadow: 0 -4px 20px rgba(255,77,109,0.15);
      display: flex;
      align-items: center;
      gap: 16px;
      border-top: 2px solid #ffe4ec;
    }
    .total-section { flex: 1; }
    .total-label { font-size: 0.85rem; color: #999; }
    .total-price { font-size: 1.5rem; font-weight: bold; color: #e63973; }
    .submit-btn {
      background: linear-gradient(135deg, #ff8fab, #ff4d6d);
      color: white;
      border: none;
      border-radius: 30px;
      padding: 14px 32px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(255,77,109,0.4);
      transition: all 0.2s;
    }
    .submit-btn:disabled { background: #ddd; box-shadow: none; cursor: not-allowed; }
    .submit-btn:not(:disabled):active { transform: scale(0.95); }
  </style>
</head>
<body>

<div class="header">
  <h1>🐝 粉紅超跑點餐外送</h1>
  <small>每週一至週五 11:30 供餐</small>
</div>

<div class="notice">
  ⚠️ <strong>今日開放點餐至 11:00</strong>，逾時不候
</div>

<div class="order-list" id="orderList"></div>

<div class="bottom-bar">
  <div class="total-section">
    <div class="total-label">訂單合計</div>
    <div class="total-price">$<span id="totalAmount">0</span></div>
  </div>
  <button class="submit-btn" id="submitBtn" onclick="submitOrder()" disabled>送出訂單</button>
</div>

<script>
const menu = [
  // 🍜 麵食
  { category: '🍜 麵食', items: [
    { id: 1, name: '泡麵', price: 60, icon: '🍜' },
    { id: 16, name: '涼麵', price: 50, icon: '🥗' },
  ]},
  // 🍚 飯類
  { category: '🍚 飯類', items: [
    { id: 3, name: '排骨便當', price: 100, icon: '🍱' },
  ]},
  // 🍗 炸物
  { category: '🍗 炸物', items: [
    { id: 5, name: '炸雞排', price: 70, icon: '🍗' },
    { id: 6, name: '薯條', price: 40, icon: '🍟' },
    { id: 7, name: '炸雞翅', price: 40, icon: '🫓' },
  ]},
  // 🥢 滷味
  { category: '🥢 滷味', items: [
    { id: 8, name: '滷蛋', price: 15, icon: '🥚' },
    { id: 9, name: '豆干', price: 15, icon: '🟤' },
    { id: 10, name: '鴨頭', price: 30, icon: '🫓' },
  ]},
  // 🧋 飲料
  { category: '🧋 飲料', items: [
    { id: 14, name: '冰飲', price: 35, icon: '🧋' },
    { id: 15, name: '咖啡', price: 40, icon: '☕' },
  ]},
];

const orders = {};
let total = 0;

function renderMenu() {
  const list = document.getElementById('orderList');
  list.innerHTML = menu.map(cat => `
    <div class="category">
      <div class="category-title">${cat.category}</div>
      ${cat.items.map(item => `
        <div class="order-item">
          <div class="item-icon">${item.icon}</div>
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-price">$${item.price}</div>
          </div>
          <div class="qty-control">
            <button class="qty-btn minus" onclick="changeQty(${item.id}, -1)">−</button>
            <span class="qty-num" id="qty-${item.id}">0</span>
            <button class="qty-btn plus" onclick="changeQty(${item.id}, 1)">+</button>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function changeQty(id, delta) {
  if (!orders[id]) orders[id] = 0;
  orders[id] = Math.max(0, orders[id] + delta);
  document.getElementById('qty-' + id).textContent = orders[id];
  recalc();
}

function recalc() {
  total = menu.flatMap(c => c.items).reduce((sum, item) => sum + (orders[item.id] || 0) * item.price, 0);
  document.getElementById('totalAmount').textContent = total;
  document.getElementById('submitBtn').disabled = total === 0;
}

const API_BASE = 'https://gyc-warehouse.onrender.com';

function submitOrder() {
  if (total === 0) return;
  const orderItems = menu.flatMap(c => c.items).filter(item => (orders[item.id] || 0) > 0).map(item => ({ name: item.name, price: item.price, qty: orders[item.id] }));
  const orderData = { items: orderItems, total: total, time: new Date().toLocaleString('zh-TW') };
  const btn = document.getElementById('submitBtn');
  btn.textContent = '傳送中...';
  btn.disabled = true;
  fetch(API_BASE + '/order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(orderData) })
  .then(r => r.json())
  .then(res => {
    if (res.success) { alert('✅ 訂單已送出！\n\n您的手機將收到 LINE 通知。'); }
    else { alert('❌ 傳送失敗：' + (res.error || '未知錯誤')); }
    Object.keys(orders).forEach(k => orders[k] = 0);
    menu.flatMap(c => c.items).forEach(item => { document.getElementById('qty-' + item.id).textContent = '0'; });
    recalc();
  })
  .catch(err => { alert('❌ 網路錯誤：' + err); btn.textContent = '送出訂單'; btn.disabled = false; });
}

renderMenu();
</script>
</body>
</html>
