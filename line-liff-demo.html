<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🚗 粉紅超跑外送</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, '微軟正黑體', sans-serif; background: #fff5f8; min-height: 100vh; padding-bottom: 90px; }

    /* 頂部 Header */
    .header {
      background: linear-gradient(135deg, #ff8fab 0%, #ff4d6d 100%);
      color: white;
      padding: 24px 20px 16px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '🚗';
      position: absolute;
      top: 10px;
      left: 20px;
      font-size: 2rem;
      opacity: 0.3;
    }
    .header::after {
      content: '💕';
      position: absolute;
      top: 10px;
      right: 20px;
      font-size: 2rem;
      opacity: 0.3;
    }
    .header h1 { font-size: 1.5rem; font-weight: bold; letter-spacing: 2px; }
    .header small { display: block; font-size: 0.85rem; opacity: 0.9; margin-top: 6px; }

    /* 公告 */
    .notice {
      margin: 16px 16px 0;
      padding: 14px 16px;
      background: linear-gradient(135deg, #fff0f5, #fff);
      border-radius: 16px;
      font-size: 0.9rem;
      color: #c9184a;
      border: 2px solid #ffb3c6;
      text-align: center;
      box-shadow: 0 4px 12px rgba(255,77,109,0.1);
    }
    .notice strong { font-size: 1.1rem; }

    /* 菜單列表 */
    .order-list { padding: 16px; display: flex; flex-direction: column; gap: 14px; }

    /* 餐點卡片 */
    .order-item {
      background: white;
      border-radius: 20px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 4px 20px rgba(255,77,109,0.08);
      border: 1px solid #ffe4ec;
      transition: all 0.2s ease;
    }
    .order-item:active { transform: scale(0.98); }

    .item-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, #fff0f5, #ffe4ec);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      flex-shrink: 0;
      border: 2px solid #ffb3c6;
    }
    .item-info { flex: 1; }
    .item-name { font-size: 1.1rem; font-weight: bold; color: #2d2d2d; }
    .item-price { font-size: 1rem; color: #e63973; margin-top: 4px; font-weight: bold; }

    /* 數量增減按鈕 */
    .qty-control { display: flex; align-items: center; gap: 12px; }
    .qty-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      font-size: 1.3rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .qty-btn.minus {
      background: #f8f8f8;
      color: #999;
      border: 2px solid #eee;
    }
    .qty-btn.plus {
      background: linear-gradient(135deg, #ff8fab, #ff4d6d);
      color: white;
      border: none;
      box-shadow: 0 4px 12px rgba(255,77,109,0.3);
    }
    .qty-btn:active { transform: scale(0.9); }
    .qty-num {
      font-size: 1.2rem;
      font-weight: bold;
      min-width: 36px;
      text-align: center;
      color: #c9184a;
    }

    /* 底部固定欄 */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      padding: 14px 20px;
      box-shadow: 0 -4px 20px rgba(255,77,109,0.15);
      display: flex;
      align-items: center;
      gap: 16px;
      border-top: 2px solid #ffe4ec;
    }
    .total-section { flex: 1; }
    .total-label { font-size: 0.85rem; color: #999; }
    .total-price { font-size: 1.5rem; font-weight: bold; color: #e63973; }
    .submit-btn {
      background: linear-gradient(135deg, #ff8fab, #ff4d6d);
      color: white;
      border: none;
      border-radius: 30px;
      padding: 14px 32px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(255,77,109,0.4);
      transition: all 0.2s;
    }
    .submit-btn:disabled {
      background: #ddd;
      box-shadow: none;
      cursor: not-allowed;
    }
    .submit-btn:not(:disabled):active { transform: scale(0.95); }
  </style>
</head>
<body>

<div class="header">
  <h1>🚗 粉紅超跑外送</h1>
  <small>每週一至週五 11:30 供餐</small>
</div>

<div class="notice">
  ⚠️ <strong>今日開放點餐至 11:00</strong>，逾時不候
</div>

<div class="order-list" id="orderList"></div>

<div class="bottom-bar">
  <div class="total-section">
    <div class="total-label">訂單合計</div>
    <div class="total-price">$<span id="totalAmount">0</span></div>
  </div>
  <button class="submit-btn" id="submitBtn" onclick="submitOrder()" disabled>送出訂單</button>
</div>

<script>
const menu = [
  { id: 1, name: '紅燒牛肉麵', price: 120, icon: '🍜' },
  { id: 2, name: '陽春麵', price: 80, icon: '🍜' },
  { id: 3, name: '餛飩湯', price: 90, icon: '🥟' },
  { id: 4, name: '滷肉飯', price: 60, icon: '🍚' },
  { id: 5, name: '貢丸湯', price: 50, icon: '🍡' },
  { id: 6, name: '燙青菜', price: 40, icon: '🥬' },
];
const orders = {};
let total = 0;
function renderMenu() {
  const list = document.getElementById('orderList');
  list.innerHTML = menu.map(item => `
    <div class="order-item">
      <div class="item-icon">${item.icon}</div>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-price">$${item.price}</div>
      </div>
      <div class="qty-control">
        <button class="qty-btn minus" onclick="changeQty(${item.id}, -1)">−</button>
        <span class="qty-num" id="qty-${item.id}">0</span>
        <button class="qty-btn plus" onclick="changeQty(${item.id}, 1)">+</button>
      </div>
    </div>
  `).join('');
}
function changeQty(id, delta) {
  if (!orders[id]) orders[id] = 0;
  orders[id] = Math.max(0, orders[id] + delta);
  document.getElementById('qty-' + id).textContent = orders[id];
  recalc();
}
function recalc() {
  total = menu.reduce((sum, item) => sum + (orders[item.id] || 0) * item.price, 0);
  document.getElementById('totalAmount').textContent = total;
  document.getElementById('submitBtn').disabled = total === 0;
}
const API_BASE = 'https://gyc-warehouse.onrender.com';
function submitOrder() {
  if (total === 0) return;
  const orderItems = menu.filter(item => (orders[item.id] || 0) > 0).map(item => ({ name: item.name, price: item.price, qty: orders[item.id] }));
  const orderData = { items: orderItems, total: total, time: new Date().toLocaleString('zh-TW') };
  const btn = document.getElementById('submitBtn');
  btn.textContent = '傳送中...';
  btn.disabled = true;
  fetch(API_BASE + '/order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(orderData) })
  .then(r => r.json())
  .then(res => {
    if (res.success) { alert('✅ 訂單已送出！\n\n您的手機將收到 LINE 通知。'); }
    else { alert('❌ 傳送失敗：' + (res.error || '未知錯誤')); }
    Object.keys(orders).forEach(k => orders[k] = 0);
    menu.forEach(item => { document.getElementById('qty-' + item.id).textContent = '0'; });
    recalc();
  })
  .catch(err => { alert('❌ 網路錯誤：' + err); btn.textContent = '送出訂單'; btn.disabled = false; });
}
renderMenu();
</script>
</body>
</html>
